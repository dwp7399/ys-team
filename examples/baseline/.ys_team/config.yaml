mode: manual
roles: []
governance_slots:
  - id: planner
    stage: spec-talk
    required: true
    purpose: 收敛需求、提出边界和形成 spec 草案
  - id: implementer
    stage: spec-work
    required: true
    purpose: 按 spec 落地并维护执行日志
  - id: spec_reviewer
    stage: spec-review
    required: true
    purpose: 独立审阅 spec 的完整性和可执行性
  - id: qa_reviewer
    stage: qa
    required: true
    purpose: 独立验证实现结果和验收证据
  - id: close_owner
    stage: close
    required: true
    purpose: 负责状态收口、归档和交付闭环
slot_bindings: []
max_retries: 2
